name: Claude Code Warmup

on:
  schedule:
    - cron: '15 9 * * 1-5'
  workflow_dispatch: {}

concurrency:
  group: claude-warmup
  cancel-in-progress: false

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    strategy:
      fail-fast: false
      matrix:
        slot: [1, 2, 3, 4, 5]
    name: Warmup token ${{ matrix.slot }}
    steps:
      - name: Check token
        id: check
        env:
          T1: ${{ secrets.CLAUDE_OAUTH_TOKEN_1 }}
          T2: ${{ secrets.CLAUDE_OAUTH_TOKEN_2 }}
          T3: ${{ secrets.CLAUDE_OAUTH_TOKEN_3 }}
          T4: ${{ secrets.CLAUDE_OAUTH_TOKEN_4 }}
          T5: ${{ secrets.CLAUDE_OAUTH_TOKEN_5 }}
        run: |
          TOKEN=$(eval echo \$T${{ matrix.slot }})
          if [ -z "$TOKEN" ]; then
            echo "CLAUDE_OAUTH_TOKEN_${{ matrix.slot }} not set — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Claude Code
        if: steps.check.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Ping Claude to anchor 5-hour window
        if: steps.check.outputs.skip != 'true'
        env:
          T1: ${{ secrets.CLAUDE_OAUTH_TOKEN_1 }}
          T2: ${{ secrets.CLAUDE_OAUTH_TOKEN_2 }}
          T3: ${{ secrets.CLAUDE_OAUTH_TOKEN_3 }}
          T4: ${{ secrets.CLAUDE_OAUTH_TOKEN_4 }}
          T5: ${{ secrets.CLAUDE_OAUTH_TOKEN_5 }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(eval echo \$T${{ matrix.slot }})

          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding":true}' > ~/.claude.json
          output_file="$(mktemp)"
          set +e
          claude -p "hi" --model haiku --no-session-persistence >"$output_file" 2>&1
          status=$?
          set -e
          cat "$output_file"

          if [ $status -eq 0 ]; then
            echo "Token ${{ matrix.slot }} warmup succeeded."
            echo "✓ Warmup complete"
            exit 0
          fi

          if grep -Eiq "expired|unauthorized|invalid token|authentication|auth failed|login required|not logged in" "$output_file"; then
            echo "Token ${{ matrix.slot }} appears invalid or expired."
            echo "Run 'claude setup-token' locally and update CLAUDE_OAUTH_TOKEN_${{ matrix.slot }} secret."
            exit 1
          fi

          if grep -qi "rate limit" "$output_file"; then
            echo "Rate limit hit for token ${{ matrix.slot }}; treating as warmup success."
            echo "✓ Warmup complete"
            exit 0
          fi

          echo "Warmup failed for token ${{ matrix.slot }} with an unexpected error."
          exit $status
